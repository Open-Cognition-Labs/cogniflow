name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly (Mon 06:00 UTC): periodic invariant check on main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test (contracts + conformance stub)
        run: pytest

  # The headline un-knowing invariant against a real FalkorDB with NO external model key: replay
  # to before a correction must not leak the later invalidation backward. Seeded structured data
  # (no extraction LLM), so it is deterministic and secret-free. Runs on PRs, weekly, and on
  # demand - NOT on direct pushes to main - to keep private-repo Actions minutes in budget (the
  # service container is the cost). The cheap `test` job still runs on every push.
  replay-invariant:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
      - name: Un-knowing invariant + API security (live FalkorDB, no LLM key)
        run: pytest tests/integration/test_replay_seeded.py tests/test_api_security.py -q

# Cogniflow - one-command local/trusted-environment standup
#   docker compose up --build      # FalkorDB + API + web, secure-by-default (auth ON)
#   bash scripts/demo.sh           # the 60-second Acme bitemporal proof (key-free)
# NOT production HA: in-memory session/queue break multi-replica; k8s and HA packaging are on the roadmap.
name: cogniflow

services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      falkordb:
        condition: service_healthy
    environment:
      COGNIFLOW_FALKORDB_HOST: falkordb
      COGNIFLOW_FALKORDB_PORT: "6379"
      # secure-by-default: auth is ON. Override the demo token for anything shared.
      COGNIFLOW_API_TOKENS: ${COGNIFLOW_DEMO_TOKEN:-cogniflow-demo-token}
      COGNIFLOW_CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      # Optional providers. The seeded Acme hero is KEY-FREE; only /answer + real ingestion
      # need these (unset -> hash embedder, which warns; /answer fails loud without an LLM key).
      COGNIFLOW_LLM_API_KEY: ${COGNIFLOW_LLM_API_KEY:-}
      COGNIFLOW_LLM_BASE_URL: ${COGNIFLOW_LLM_BASE_URL:-}
      COGNIFLOW_LLM_MODEL: ${COGNIFLOW_LLM_MODEL:-}
      COGNIFLOW_EMBEDDER_API_KEY: ${COGNIFLOW_EMBEDDER_API_KEY:-}
    ports:
      - "8000:8000"

  web:
    build:
      context: ./cogniflow-web
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
        NEXT_PUBLIC_API_TOKEN: ${COGNIFLOW_DEMO_TOKEN:-cogniflow-demo-token}
    depends_on:
      - api
    ports:
      - "3000:3000"
